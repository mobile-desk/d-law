# Render blueprint: https://render.com/docs/infrastructure-as-code
# Netlify cannot run Django; this deploys the app on Render instead.

databases:
  - name: legal-access-db
    databaseName: legal_access
    user: legal_access
    plan: free

services:
  - type: web
    name: legal-access
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput && python manage.py ensure_superuser --bootstrap && python manage.py populate_lawyer_profiles --bootstrap 8
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      # Set to "false" in production when you no longer need the debug error pages.
      - key: DJANGO_DEBUG
        value: "true"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        sync: false
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: legal-access-db
          property: connectionString
      # First deploy: set both so ensure_superuser --bootstrap can create /admin login.
      # After a superuser exists, bootstrap no-ops; you may remove the password from the dashboard.
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
