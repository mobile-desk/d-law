{% extends "base.html" %}
{% block title %}Log in{% endblock %}
{% block content %}
<h1>Log in</h1>
<p class="lead">Access your cases and messages.</p>

<form method="post" class="card form-card" action="{% url 'login' %}">
  {% csrf_token %}
  {% for field in form %}
    <div class="form-group">
      {{ field.label_tag }}
      {{ field }}
      {{ field.errors }}
    </div>
  {% endfor %}
  <button type="submit" class="btn btn-primary btn-block">Log in</button>
</form>
<p class="footer-note"><a href="{% url 'register' %}">Need an account?</a></p>
{% endblock %}
